name: Build PassGuard

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: macos-14

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Select Xcode 15
        run: sudo xcode-select -s /Applications/Xcode_15.4.app/Contents/Developer

      - name: Clean DerivedData
        run: rm -rf ~/Library/Developer/Xcode/DerivedData

      - name: Build
        run: |
          xcodebuild \
            -project PassGuard.xcodeproj \
            -scheme PassGuard \
            -configuration Release \
            -sdk iphoneos \
            -destination "generic/platform=iOS" \
            -derivedDataPath ./DerivedData \
            CODE_SIGNING_ALLOWED=NO \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGN_IDENTITY="" \
            ONLY_ACTIVE_ARCH=NO \
            clean build

      - name: Copy Icons into .app bundle
        run: |
          APP_PATH=$(find ./DerivedData -name "PassGuard.app" -type d | head -1)
          ICON_SRC="PassGuard/Assets.xcassets/AppIcon.appiconset"
          cp "$ICON_SRC/Icon-60@2x.png"  "$APP_PATH/Icon-60@2x.png"
          cp "$ICON_SRC/Icon-60@3x.png"  "$APP_PATH/Icon-60@3x.png"
          cp "$ICON_SRC/Icon-40@2x.png"  "$APP_PATH/Icon-40@2x.png"
          cp "$ICON_SRC/Icon-40@3x.png"  "$APP_PATH/Icon-40@3x.png"
          cp "$ICON_SRC/Icon-29@2x.png"  "$APP_PATH/Icon-29@2x.png"
          cp "$ICON_SRC/Icon-29@3x.png"  "$APP_PATH/Icon-29@3x.png"
          cp "$ICON_SRC/Icon-20@2x.png"  "$APP_PATH/Icon-20@2x.png"
          cp "$ICON_SRC/Icon-20@3x.png"  "$APP_PATH/Icon-20@3x.png"
          cp "$ICON_SRC/Icon-1024.png"   "$APP_PATH/Icon-1024.png"
          /usr/libexec/PlistBuddy \
            -c "Set :CFBundleIcons:CFBundlePrimaryIcon:CFBundleIconFiles:0 Icon-60@2x" \
            -c "Set :CFBundleIcons:CFBundlePrimaryIcon:CFBundleIconFiles:1 Icon-60@3x" \
            "$APP_PATH/Info.plist" || true

      - name: Package .ipa (Payload structure)
        run: |
          APP_PATH=$(find ./DerivedData -name "PassGuard.app" -type d | head -1)
          mkdir -p Payload
          cp -r "$APP_PATH" Payload/PassGuard.app
          zip -r PassGuard.ipa Payload
          rm -rf Payload

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v1.0.${{ github.run_number }}
          name: PassGuard v1.0.${{ github.run_number }}
          prerelease: true
          files: PassGuard.ipa
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
